<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Operasional - E-Daily</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            navy: '#00254d',
                            blue: '#0064ff',
                            softBlue: '#e6f0ff',
                            platinum: '#f8fafc'
                        }
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Mencegah layout pecah di zoom 100% */
        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        .leaflet-container {
            font-family: 'Plus Jakarta Sans', sans-serif !important;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #0064ff;
        }

        @media (max-width: 1024px) {
            .sidebar-mobile {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar-mobile.active {
                transform: translateX(0);
            }
        }
    </style>
</head>

<body class="bg-brand-platinum flex font-sans text-slate-900">

    <!-- OVERLAY MOBILE -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-brand-navy/50 z-40 hidden lg:hidden" onclick="toggleSidebar()">
    </div>

    <!-- SIDEBAR NAVIGATION -->
    <aside id="sidebar"
        class="sidebar-mobile fixed lg:static inset-y-0 left-0 w-72 bg-brand-navy flex flex-col z-50 transition-all duration-300 shadow-2xl shrink-0">
        <div class="p-8 border-b border-white/5 flex flex-col items-center text-center relative overflow-hidden">
            <!-- Background Decoration dari Banner -->
            <img src="assets/img/slides/img-3.png"
                class="absolute inset-0 w-full h-full object-cover opacity-10 pointer-events-none" alt="">

            <div
                class="w-12 h-12 bg-brand-blue rounded-2xl flex items-center justify-center text-white font-black text-2xl shadow-lg relative z-10">
                E</div>
            <h2 class="text-white font-extrabold tracking-widest uppercase text-xs mt-4 relative z-10">E-Daily Report
            </h2>
            <p class="text-brand-blue text-[10px] font-bold uppercase tracking-[0.2em] mt-1 relative z-10">Dewan
                Eksekutif</p>
        </div>

        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
            <a href="dashboard.html"
                class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl transition-all text-sm font-semibold">
                <span>📈</span> Dashboard
            </a>
            <div class="px-4 mt-8 mb-3 text-[10px] font-black text-slate-500 uppercase tracking-widest">Pengawasan
                Korporat</div>
            <a href="division-ranking.html"
                class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl transition-all text-sm font-semibold">
                <span>🏆</span> Peringkat Divisi
            </a>
            <a href="company-gis.html"
                class="flex items-center gap-3 px-4 py-3 text-white bg-brand-blue/20 rounded-xl font-bold transition-all border-l-4 border-brand-blue text-sm">
                <span>🌍</span> Sebaran Aktivitas Pegawai
            </a>
            <div class="px-4 mt-8 mb-3 text-[10px] font-black text-slate-500 uppercase tracking-widest">Pusat Komando
            </div>
            <a href="internal-memo.html"
                class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl transition-all text-sm font-semibold">
                <span>📢</span> Pengumuman
            </a>
        </nav>

        <div class="p-6 border-t border-white/5">
            <button onclick="AuthEngine.logout()"
                class="w-full py-3 bg-white/5 hover:bg-red-500/20 text-white text-[10px] font-black uppercase rounded-xl transition-all border border-white/10">Keluar
                Sistem</button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">

        <!-- HEADER -->
        <header
            class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-6 lg:px-10 z-20 shadow-sm shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 text-brand-navy">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16m-7 6h7"></path>
                    </svg>
                </button>
                <div>
                    <h1 class="text-lg lg:text-xl font-black text-brand-navy uppercase tracking-tight">Radar Operasional
                    </h1>
                    <p
                        class="hidden md:block text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5 text-ellipsis overflow-hidden">
                        Monitoring Spasial Seluruh Wilayah Jakarta</p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <select id="filter-dept"
                    class="bg-slate-100 border-none rounded-full px-4 lg:px-6 py-2.5 text-[10px] font-black uppercase tracking-widest outline-none focus:ring-2 focus:ring-brand-blue"
                    onchange="renderMap()">
                    <option value="ALL">SEMUA DEPARTEMEN</option>
                </select>
            </div>
        </header>

        <!-- MAP & STATS AREA -->
        <div class="flex-1 flex flex-col lg:flex-row relative overflow-hidden">

            <!-- STATS PANEL (KIRI) -->
            <div id="stats-panel"
                class="w-full lg:w-80 bg-white border-r border-slate-200 flex flex-col z-10 shadow-xl lg:h-full overflow-hidden transition-all duration-300">
                <!-- Lokasi Distribution Stats -->
                <div class="p-6 bg-brand-navy text-white space-y-4 shrink-0">
                    <h4
                        class="text-[9px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-700 pb-2">
                        Distribusi Lokasi</h4>
                    <div class="grid grid-cols-3 lg:grid-cols-1 gap-4 lg:gap-3">
                        <div class="flex flex-col lg:flex-row lg:justify-between lg:items-center">
                            <span class="text-[9px] lg:text-[10px] font-bold uppercase text-blue-400">Kantor</span>
                            <span class="text-lg lg:text-xl font-black" id="count-office">0</span>
                        </div>
                        <div class="flex flex-col lg:flex-row lg:justify-between lg:items-center">
                            <span class="text-[9px] lg:text-[10px] font-bold uppercase text-emerald-400">WFA</span>
                            <span class="text-lg lg:text-xl font-black" id="count-remote">0</span>
                        </div>
                        <div class="flex flex-col lg:flex-row lg:justify-between lg:items-center">
                            <span class="text-[9px] lg:text-[10px] font-bold uppercase text-amber-400">Lapangan</span>
                            <span class="text-lg lg:text-xl font-black" id="count-field">0</span>
                        </div>
                    </div>
                </div>

                <div class="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center shrink-0">
                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Personel Aktif</h4>
                    <button class="lg:hidden text-brand-blue text-[10px] font-bold" onclick="toggleStats()">Lihat Peta
                        🗺️</button>
                </div>

                <div id="list-global-log" class="flex-1 overflow-y-auto p-4 space-y-3 bg-white scroll-smooth">
                    <!-- List data akan dimuat di sini -->
                </div>
            </div>

            <!-- MAP (KANAN) -->
            <div id="map" class="flex-1 z-0 bg-slate-200 min-h-[300px]"></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../assets/js/db-mock.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        let map, markers;

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sb.classList.toggle('active');
            overlay.classList.toggle('hidden');
        }

        // Untuk mobile, toggle tampilan antara list dan peta
        function toggleStats() {
            const panel = document.getElementById('stats-panel');
            panel.classList.toggle('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Inisialisasi Peta Fokus Jakarta
            map = L.map('map', { zoomControl: false }).setView([-6.2088, 106.8456], 11);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            L.control.zoom({ position: 'bottomright' }).addTo(map);
            markers = L.layerGroup().addTo(map);

            const dbData = MockDB._getData();
            const select = document.getElementById('filter-dept');

            (dbData.departments || []).forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.id;
                opt.innerText = d.name.toUpperCase();
                select.appendChild(opt);
            });

            renderMap();
        });

        function renderMap() {
            markers.clearLayers();
            const dbData = MockDB._getData();
            const filterId = document.getElementById('filter-dept').value;
            const lkhs = MockDB.getTimesheets();

            let c = { OFFICE: 0, REMOTE: 0, CLIENT_SITE: 0 };
            const side = document.getElementById('list-global-log');
            side.innerHTML = '';

            const bounds = [];

            lkhs.forEach(l => {
                if (!l.lat || !l.lng) return;
                const user = dbData.users.find(u => u.id === l.user_id);
                if (!user || (filterId !== 'ALL' && user.dept_id !== filterId)) return;

                c[l.location_mode]++;
                let color = l.location_mode === 'OFFICE' ? '#3b82f6' : (l.location_mode === 'REMOTE' ? '#10b981' : '#f59e0b');

                const icon = L.divIcon({
                    html: `<div class="relative flex items-center justify-center">
                            <div class="absolute w-6 h-6 rounded-full bg-white/50 animate-ping"></div>
                            <div class="w-4 h-4 rounded-full border-2 border-white shadow-lg" style="background:${color}"></div>
                           </div>`,
                    className: '', iconSize: [24, 24]
                });

                L.marker([l.lat, l.lng], { icon }).addTo(markers).bindPopup(`
                    <div class="p-2 font-sans">
                        <p class="font-black text-brand-navy uppercase text-[12px]">${user.name}</p>
                        <p class="text-[9px] text-slate-400 mb-2 uppercase font-bold tracking-widest border-b pb-1">${l.location_mode} • ${new Date(l.date).toLocaleTimeString('id-ID')}</p>
                        <p class="text-[11px] leading-relaxed text-slate-600 bg-slate-50 p-2 rounded-lg border border-slate-100 italic">"${l.activity}"</p>
                    </div>
                `);

                bounds.push([l.lat, l.lng]);

                // Create Card untuk list di panel kiri
                const card = document.createElement('div');
                card.className = "p-4 rounded-2xl border border-slate-100 hover:border-brand-blue bg-white cursor-pointer transition-all shadow-sm hover:shadow-lg group";
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[11px] font-extrabold text-brand-navy uppercase truncate group-hover:text-brand-blue">${user.name}</span>
                        <div class="w-2 h-2 rounded-full" style="background:${color}"></div>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${l.location_mode}</span>
                        <span class="text-[9px] text-slate-300 font-medium">${new Date(l.date).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })}</span>
                    </div>
                `;
                card.onclick = () => {
                    if (window.innerWidth < 1024) toggleStats(); // Sembunyikan panel di mobile saat klik profil
                    map.flyTo([l.lat, l.lng], 16, { duration: 1.5 });
                };
                side.appendChild(card);
            });

            document.getElementById('count-office').innerText = c.OFFICE;
            document.getElementById('count-remote').innerText = c.REMOTE;
            document.getElementById('count-field').innerText = c.CLIENT_SITE;

            if (bounds.length > 0) map.fitBounds(bounds, { padding: [50, 50] });
        }
    </script>
</body>

</html>
