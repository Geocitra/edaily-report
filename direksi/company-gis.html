<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Operasional - E-Daily</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            navy: '#00254d',
                            blue: '#0064ff',
                            softBlue: '#e6f0ff',
                            platinum: '#f8fafc'
                        }
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Standarisasi Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .leaflet-container {
            font-family: 'Plus Jakarta Sans', sans-serif !important;
        }

        /* Shadow khusus untuk panel bottom sheet di mobile */
        .panel-shadow {
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>

<body class="bg-brand-platinum h-screen flex overflow-hidden font-sans text-slate-900">

    <div id="sidebar-overlay"
        class="fixed inset-0 bg-slate-900/60 z-[60] hidden lg:hidden backdrop-blur-sm transition-opacity"
        onclick="toggleSidebarNav()"></div>

    <aside id="sidebar"
        class="fixed lg:static inset-y-0 left-0 transform -translate-x-full lg:translate-x-0 w-64 bg-brand-navy h-screen flex flex-col shadow-2xl z-[70] transition-transform duration-300 ease-in-out flex-shrink-0">
        <div
            class="p-8 border-b border-white/5 flex flex-col items-center text-center relative overflow-hidden shrink-0">
            <img src="../assets/img/slides/img-3.png"
                class="absolute inset-0 w-full h-full object-cover opacity-10 pointer-events-none" alt="">

            <button onclick="toggleSidebarNav()"
                class="absolute top-4 right-4 text-slate-400 hover:text-white lg:hidden z-20">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <div
                class="w-12 h-12 bg-brand-blue rounded-2xl flex items-center justify-center text-white font-black text-2xl shadow-lg relative z-10 mb-3">
                E</div>
            <h2 class="text-white font-extrabold tracking-widest uppercase text-xs relative z-10">E-Daily Report</h2>
            <p class="text-brand-blue text-[10px] font-bold uppercase tracking-[0.2em] mt-1 relative z-10">Dewan
                Eksekutif</p>
        </div>

        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-1 custom-scrollbar">
            <a href="dashboard.html"
                class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl transition-all text-sm font-semibold">
                <span>📈</span> Dashboard
            </a>
            <div class="px-4 mt-8 mb-3 text-[10px] font-black text-slate-500 uppercase tracking-widest">Pengawasan
                Korporat</div>
            <a href="division-ranking.html"
                class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl transition-all text-sm font-semibold">
                <span>🏆</span> Peringkat Divisi
            </a>
            <a href="company-gis.html"
                class="flex items-center gap-3 px-4 py-3 text-white bg-brand-blue/20 rounded-xl font-bold transition-all border-l-4 border-brand-blue text-sm">
                <span>🌍</span> Sebaran Aktivitas Pegawai
            </a>

            <div class="px-4 mt-8 mb-3 text-[10px] font-black text-slate-500 uppercase tracking-widest">Pusat Komando
            </div>
            <a href="internal-memo.html"
                class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl transition-all text-sm font-semibold">
                <span>📢</span> Pengumuman
            </a>
        </nav>

        <div class="p-6 border-t border-white/5 shrink-0">
            <button onclick="AuthEngine.logout()"
                class="w-full py-3 bg-white/5 hover:bg-red-500/20 text-white text-[10px] font-black uppercase rounded-xl transition-all border border-white/10">Keluar
                Sistem</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative w-full">
        <header
            class="h-16 md:h-20 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-8 z-30 shadow-sm shrink-0 relative">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebarNav()" class="lg:hidden p-2 bg-slate-100 rounded-lg text-brand-navy">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16m-7 6h7"></path>
                    </svg>
                </button>
                <div>
                    <h1 class="text-lg md:text-xl font-extrabold text-brand-navy uppercase tracking-tight">Radar
                        Operasional</h1>
                    <p class="hidden md:block text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">
                        Monitoring Spasial Seluruh Wilayah Perusahaan</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <select id="filter-dept"
                    class="bg-brand-platinum border border-slate-200 rounded-full px-4 lg:px-6 py-2 text-[10px] font-black uppercase tracking-widest outline-none focus:ring-2 focus:ring-brand-blue shadow-sm cursor-pointer max-w-[140px] md:max-w-none truncate"
                    onchange="renderMap()">
                    <option value="ALL">🏢 SEMUA DEPARTEMEN</option>
                </select>
                <div
                    class="hidden sm:flex h-10 w-10 rounded-full bg-slate-100 text-brand-blue items-center justify-center text-lg shadow-inner font-black border border-slate-200 shrink-0">
                    👑</div>
            </div>
        </header>

        <div class="flex-1 relative flex overflow-hidden w-full h-full bg-slate-200">

            <div id="map" class="absolute inset-0 z-0"></div>

            <div id="list-panel"
                class="absolute inset-x-0 bottom-0 lg:relative lg:w-80 xl:w-96 h-[65vh] lg:h-full bg-white lg:border-r border-slate-200 flex flex-col z-[40] panel-shadow lg:shadow-2xl transform translate-y-full lg:translate-y-0 transition-transform duration-300 ease-in-out lg:rounded-none rounded-t-3xl overflow-hidden">

                <div class="w-full flex justify-center py-3 lg:hidden shrink-0 bg-white" onclick="toggleListPanel()">
                    <div class="w-12 h-1.5 bg-slate-300 rounded-full"></div>
                </div>

                <div class="relative h-24 md:h-32 overflow-hidden shrink-0 bg-brand-navy">
                    <div id="banner-slider"
                        class="absolute inset-0 flex transition-transform duration-[1.5s] ease-in-out">
                        <img src="../assets/img/slides/img-3.png" class="w-full h-full object-cover brightness-50"
                            alt="">
                        <img src="../assets/img/slides/img-1.png" class="w-full h-full object-cover brightness-50"
                            alt="">
                        <img src="../assets/img/slides/img-2.png" class="w-full h-full object-cover brightness-50"
                            alt="">
                    </div>
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-brand-navy/80 to-transparent flex flex-col justify-end p-4">
                        <h4 class="text-white text-xs font-bold uppercase tracking-widest">Aliran Aktivitas Global</h4>
                        <div class="flex gap-1 mt-2">
                            <div class="h-1 w-4 rounded-full bg-brand-blue" id="b-dot-0"></div>
                            <div class="h-1 w-1.5 rounded-full bg-white/30" id="b-dot-1"></div>
                            <div class="h-1 w-1.5 rounded-full bg-white/30" id="b-dot-2"></div>
                        </div>
                    </div>
                </div>

                <div class="p-3 md:p-4 bg-slate-50 border-b border-slate-200 shrink-0 z-10 relative">
                    <div class="grid grid-cols-4 gap-1.5 md:gap-2">
                        <div class="bg-white p-2 rounded-lg border border-slate-200 text-center shadow-sm">
                            <span
                                class="block text-[8px] md:text-[9px] font-black text-brand-blue uppercase tracking-widest">WFO</span>
                            <span class="block text-sm md:text-lg font-black text-slate-800" id="count-wfo">0</span>
                        </div>
                        <div class="bg-white p-2 rounded-lg border border-slate-200 text-center shadow-sm">
                            <span
                                class="block text-[8px] md:text-[9px] font-black text-emerald-600 uppercase tracking-widest">WFH</span>
                            <span class="block text-sm md:text-lg font-black text-slate-800" id="count-wfh">0</span>
                        </div>
                        <div class="bg-white p-2 rounded-lg border border-slate-200 text-center shadow-sm">
                            <span
                                class="block text-[8px] md:text-[9px] font-black text-purple-600 uppercase tracking-widest">WFA</span>
                            <span class="block text-sm md:text-lg font-black text-slate-800" id="count-wfa">0</span>
                        </div>
                        <div class="bg-white p-2 rounded-lg border border-slate-200 text-center shadow-sm">
                            <span
                                class="block text-[8px] md:text-[9px] font-black text-rose-600 uppercase tracking-widest">Luar</span>
                            <span class="block text-sm md:text-lg font-black text-slate-800" id="count-luar">0</span>
                        </div>
                    </div>
                </div>

                <div id="list-global-log"
                    class="flex-1 overflow-y-auto p-4 space-y-3 bg-brand-platinum/30 custom-scrollbar pb-24 lg:pb-4 relative z-0">
                </div>
            </div>

            <button id="btn-toggle-panel" onclick="toggleListPanel()"
                class="lg:hidden absolute bottom-6 left-1/2 transform -translate-x-1/2 z-[50] bg-brand-navy text-white px-6 py-3.5 rounded-full shadow-[0_10px_25px_rgba(0,0,0,0.5)] font-black text-[10px] tracking-widest flex items-center gap-2 border border-white/10 active:scale-95 transition-all">
                <span id="icon-toggle">📋</span> <span id="text-toggle">TAMPILKAN DAFTAR</span>
            </button>

        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../assets/js/db-mock.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        let map, markersGroup;
        let isPanelOpen = false;

        function toggleSidebarNav() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        // Logic Toggle Bottom Sheet Panel (Mobile)
        function toggleListPanel() {
            const panel = document.getElementById('list-panel');
            const btnText = document.getElementById('text-toggle');
            const btnIcon = document.getElementById('icon-toggle');

            if (isPanelOpen) {
                panel.classList.add('translate-y-full');
                btnText.innerText = "TAMPILKAN DAFTAR";
                btnIcon.innerText = "📋";
                isPanelOpen = false;
            } else {
                panel.classList.remove('translate-y-full');
                btnText.innerText = "TUTUP DAFTAR";
                btnIcon.innerText = "✖";
                isPanelOpen = true;
            }
        }

        function closeListPanelMobile() {
            if (window.innerWidth < 1024 && isPanelOpen) {
                toggleListPanel();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initMap();

            // Populate Departments
            const dbData = MockDB._getData();
            const select = document.getElementById('filter-dept');
            (dbData.departments || []).forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.id;
                opt.innerText = d.name.toUpperCase();
                select.appendChild(opt);
            });

            renderMap();

            // Slider Logic
            let slideIdx = 0;
            const slider = document.getElementById('banner-slider');
            const dots = [document.getElementById('b-dot-0'), document.getElementById('b-dot-1'), document.getElementById('b-dot-2')];

            setInterval(() => {
                slideIdx = (slideIdx + 1) % 3;
                if (slider) slider.style.transform = `translateX(-${slideIdx * 100}%)`;
                dots.forEach((dot, index) => {
                    if (!dot) return;
                    if (index === slideIdx) {
                        dot.classList.replace('w-1.5', 'w-4');
                        dot.classList.replace('bg-white/30', 'bg-brand-blue');
                    } else {
                        dot.classList.replace('w-4', 'w-1.5');
                        dot.classList.replace('bg-brand-blue', 'bg-white/30');
                    }
                });
            }, 5000);
        });

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([-6.2088, 106.8456], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            L.control.zoom({ position: 'bottomright' }).addTo(map);
            document.querySelector('.leaflet-control-zoom').style.marginBottom = '80px';

            markersGroup = L.layerGroup().addTo(map);
        }

        function renderMap() {
            markersGroup.clearLayers();
            const dbData = MockDB._getData();
            const filterId = document.getElementById('filter-dept').value;
            const lkhs = MockDB.getTimesheets();

            let counts = { OFFICE: 0, WFH: 0, WFA: 0, CLIENT_SITE: 0 };
            const sidebar = document.getElementById('list-global-log');
            sidebar.innerHTML = '';

            const bounds = [];

            let renderedCount = 0;

            lkhs.forEach(l => {
                if (!l.lat || !l.lng) return;
                const user = dbData.users.find(u => u.id === l.user_id);
                if (!user || (filterId !== 'ALL' && user.dept_id !== filterId)) return;

                if (counts[l.location_mode] !== undefined) {
                    counts[l.location_mode]++;
                }
                renderedCount++;

                // Warna & Teks Berdasarkan Mode Kerja Korporat
                let color = '#0064ff'; // WFO (Biru)
                let modeText = 'KANTOR';
                let modeBg = 'bg-brand-softBlue', modeTextColor = 'text-brand-blue';

                if (l.location_mode === 'WFH') {
                    color = '#10b981'; modeText = 'WFH'; modeBg = 'bg-emerald-50'; modeTextColor = 'text-emerald-600';
                } else if (l.location_mode === 'WFA') {
                    color = '#9333ea'; modeText = 'WFA'; modeBg = 'bg-purple-50'; modeTextColor = 'text-purple-600';
                } else if (l.location_mode === 'CLIENT_SITE') {
                    color = '#e11d48'; modeText = 'LAPANGAN'; modeBg = 'bg-rose-50'; modeTextColor = 'text-rose-600';
                }

                const icon = L.divIcon({
                    html: `
                        <div class="relative flex items-center justify-center">
                            <div class="absolute w-6 h-6 rounded-full bg-white/50 animate-ping"></div>
                            <div class="w-4 h-4 rounded-full border-2 border-white shadow-lg relative z-10" style="background:${color}"></div>
                        </div>`,
                    className: '', iconSize: [24, 24]
                });

                const timeStr = new Date(l.date).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

                L.marker([l.lat, l.lng], { icon }).addTo(markersGroup).bindPopup(`
                    <div class="p-2 font-sans min-w-[180px]">
                        <p class="font-black text-brand-navy uppercase text-[12px]">${user.name}</p>
                        <p class="text-[9px] text-slate-400 mb-2 uppercase font-bold tracking-widest border-b border-slate-100 pb-1">${modeText} • ${timeStr}</p>
                        <div class="text-[11px] leading-relaxed text-slate-600 bg-slate-50 p-2 rounded-lg border border-slate-100 italic">"${l.activity}"</div>
                    </div>
                `);

                bounds.push([l.lat, l.lng]);

                // Create Card untuk list di panel kiri / bottom sheet
                const card = document.createElement('div');
                card.className = "p-4 bg-white rounded-2xl border border-slate-100 hover:border-brand-blue cursor-pointer transition-all shadow-sm hover:shadow-md group relative overflow-hidden";
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-1 relative z-10">
                        <span class="text-[11px] font-extrabold text-brand-navy uppercase truncate group-hover:text-brand-blue pr-2 transition-colors">${user.name}</span>
                        <div class="w-2.5 h-2.5 rounded-full shrink-0" style="background:${color}"></div>
                    </div>
                    <p class="text-[11px] font-medium text-slate-500 line-clamp-2 leading-relaxed mb-3 relative z-10 italic">"${l.activity}"</p>
                    <div class="flex items-center justify-between relative z-10 border-t border-slate-50 pt-2">
                        <span class="px-2 py-1 ${modeBg} ${modeTextColor} rounded text-[8px] font-black uppercase tracking-widest border border-current/10">📍 ${modeText}</span>
                        <span class="text-[9px] text-slate-400 font-bold">${timeStr}</span>
                    </div>
                `;
                card.onclick = () => {
                    closeListPanelMobile();
                    map.flyTo([l.lat, l.lng], 16, { duration: 1.5 });
                };
                sidebar.appendChild(card);
            });

            if (renderedCount === 0) {
                sidebar.innerHTML = `
                    <div class="p-10 text-center flex flex-col items-center justify-center h-full text-slate-400">
                        <span class="text-4xl mb-4">📍</span>
                        <p class="font-bold uppercase text-[10px] tracking-widest leading-loose">Tidak ada data spasial<br>untuk departemen ini.</p>
                    </div>`;
            }

            document.getElementById('count-wfo').innerText = counts.OFFICE;
            document.getElementById('count-wfh').innerText = counts.WFH;
            document.getElementById('count-wfa').innerText = counts.WFA;
            document.getElementById('count-luar').innerText = counts.CLIENT_SITE;

            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
            } else {
                map.setView([-6.2088, 106.8456], 11);
            }
        }
    </script>
</body>

</html>
