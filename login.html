<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Daily Report - Performance Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            navy: '#00254d',
                            blue: '#0064ff',
                            softBlue: '#e6f0ff',
                            platinum: '#f8fafc'
                        }
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    animation: {
                        'fade-up': 'fadeUp 0.8s ease-out forwards',
                    },
                    keyframes: {
                        fadeUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-gradient {
            background: linear-gradient(to top, rgba(0, 37, 77, 1) 0%, rgba(0, 37, 77, 0.4) 100%);
        }

        /* Custom Scrollbar untuk sisi login agar tetap estetik */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: #f8fafc;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-white font-sans antialiased">

    <div class="flex flex-col lg:flex-row min-h-screen w-full">

        <div class="relative w-full h-[35vh] lg:h-screen lg:w-[55%] lg:sticky lg:top-0 bg-brand-navy overflow-hidden">
            <div id="hero-slider"
                class="flex w-full h-full transition-transform duration-[2s] ease-[cubic-bezier(0.4,0,0.2,1)]">
                <img src="assets/img/slides/img-3.png" class="w-full h-full object-cover flex-shrink-0 brightness-[0.7]"
                    alt="Slide 1">
                <img src="assets/img/slides/img-1.png" class="w-full h-full object-cover flex-shrink-0 brightness-[0.7]"
                    alt="Slide 2">
                <img src="assets/img/slides/img-2.png" class="w-full h-full object-cover flex-shrink-0 brightness-[0.7]"
                    alt="Slide 3">
            </div>

            <div class="absolute inset-0 hero-gradient flex flex-col justify-end p-6 md:p-12 lg:p-16">
                <div class="animate-fade-up">
                    <div class="flex items-center gap-3 mb-4 lg:mb-6">
                        <div
                            class="w-10 h-10 lg:w-12 lg:h-12 bg-brand-blue rounded-xl flex items-center justify-center text-white font-extrabold text-xl shadow-lg">
                            E
                        </div>
                        <div class="h-6 w-[1px] bg-white/20"></div>
                        <h2 class="text-white text-xs lg:text-sm font-bold tracking-[0.2em] uppercase opacity-90">
                            E-Daily Report</h2>
                    </div>

                    <h1
                        class="text-2xl md:text-4xl lg:text-5xl font-extrabold text-white mb-4 leading-tight tracking-tight">
                        Tingkatkan Performa.<br><span class="text-brand-blue">Ukur Hasil Nyata.</span>
                    </h1>

                    <div class="hidden md:block glass-effect p-5 rounded-2xl max-w-md">
                        <p class="text-blue-100/80 text-sm lg:text-base leading-relaxed">
                            Sistem manajemen kinerja terpadu untuk mendorong efisiensi operasional dan akuntabilitas
                            kerja pegawai.
                        </p>
                    </div>
                </div>

                <div class="flex gap-2 mt-6 lg:mt-8">
                    <div class="h-1 w-8 rounded-full bg-brand-blue transition-all duration-500" id="dot-0"></div>
                    <div class="h-1 w-3 rounded-full bg-white/20 transition-all duration-500" id="dot-1"></div>
                    <div class="h-1 w-3 rounded-full bg-white/20 transition-all duration-500" id="dot-2"></div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-white relative">
            <div class="absolute inset-0 opacity-[0.03] pointer-events-none"
                style="background-image: radial-gradient(#00254d 1.5px, transparent 1.5px); background-size: 24px 24px;">
            </div>

            <div class="relative z-10 flex flex-col min-h-full">
                <div class="flex-1 flex flex-col justify-center px-6 py-12 md:px-12 lg:px-16 max-w-xl mx-auto w-full">
                    <div class="mb-8 text-center lg:text-left">
                        <h2 class="text-3xl lg:text-4xl font-extrabold text-brand-navy mb-3 tracking-tight">Selamat
                            Datang</h2>
                        <p class="text-slate-500 font-medium text-sm lg:text-base">
                            Silakan pilih profil akses Anda untuk melanjutkan ke sistem manajemen kinerja.
                        </p>
                    </div>

                    <div class="grid gap-3 lg:gap-4" id="auth-roles">
                    </div>

                    <div class="mt-10 pt-8 border-t border-slate-100 flex flex-col items-center lg:items-start gap-4">
                        <div class="flex items-center gap-2 px-3 py-1.5 bg-brand-softBlue rounded-full">
                            <span class="relative flex h-2 w-2">
                                <span
                                    class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-blue opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-brand-blue"></span>
                            </span>
                            <span class="text-[10px] font-bold text-brand-blue uppercase tracking-wider">Sistem Simulasi
                                Aktif</span>
                        </div>
                        <p class="text-slate-400 text-[10px] font-medium uppercase tracking-[0.2em]">&copy; 2026
                            Geocitra</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/db-mock.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Slider Logic
            let slideIdx = 0;
            const slider = document.getElementById('hero-slider');
            const dots = [document.getElementById('dot-0'), document.getElementById('dot-1'), document.getElementById('dot-2')];

            setInterval(() => {
                slideIdx = (slideIdx + 1) % 3;
                if (slider) slider.style.transform = `translateX(-${slideIdx * 100}%)`;

                dots.forEach((dot, i) => {
                    if (!dot) return;
                    if (i === slideIdx) {
                        dot.classList.replace('w-3', 'w-8');
                        dot.classList.replace('bg-white/20', 'bg-brand-blue');
                    } else {
                        dot.classList.replace('w-8', 'w-3');
                        dot.classList.replace('bg-brand-blue', 'bg-white/20');
                    }
                });
            }, 5000);

            // Populate Users
            const users = (typeof MockDB !== 'undefined') ? MockDB.getUsers() : [];
            const container = document.getElementById('auth-roles');

            if (!container) return;

            const demoProfiles = [
                users.find(u => u.role === 'DIREKSI'),
                users.find(u => u.role === 'MANAGER'),
                users.find(u => u.id === 'EMP-101'),
                users.find(u => u.role === 'ADMIN')
            ].filter(Boolean);

            demoProfiles.forEach((user, index) => {
                let badgeStyles = 'bg-brand-softBlue text-brand-blue border border-brand-blue/10';
                if (user.role === 'DIREKSI') badgeStyles = 'bg-brand-navy text-white';
                else if (user.role === 'MANAGER') badgeStyles = 'bg-brand-blue text-white';
                else if (user.role === 'ADMIN') badgeStyles = 'bg-slate-800 text-white';

                const btn = document.createElement('button');
                btn.style.animation = `fadeUp 0.5s ease-out forwards ${0.2 + (index * 0.1)}s`;
                btn.style.opacity = '0';
                btn.className = `w-full group flex items-center justify-between p-4 border border-slate-100 rounded-2xl 
                               hover:border-brand-blue/30 hover:bg-brand-softBlue/10 hover:shadow-lg 
                               transform active:scale-[0.98] lg:hover:-translate-y-1 transition-all duration-300 bg-white text-left`;

                btn.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-[9px] w-fit px-2 py-0.5 rounded-md uppercase font-extrabold tracking-widest mb-1.5 ${badgeStyles}">
                            ${user.role}
                        </span>
                        <strong class="text-base lg:text-lg font-bold text-brand-navy group-hover:text-brand-blue transition-colors">
                            ${user.title}
                        </strong>
                        <span class="text-xs font-semibold text-slate-400">${user.name}</span>
                    </div>
                    <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-slate-300 
                                group-hover:bg-brand-blue group-hover:text-white transition-all duration-300 shrink-0 ml-4">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                        </svg>
                    </div>
                `;
                btn.onclick = () => (typeof AuthEngine !== 'undefined') && AuthEngine.login(user);
                container.appendChild(btn);
            });
        });
    </script>
</body>

</html>
